<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Management - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-input {
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 5px;
            background-color: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input:hover {
            border-color: #667eea;
            background-color: #f0f0ff;
        }

        .file-input.dragover {
            border-color: #667eea;
            background-color: #e8f0ff;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            margin-right: 10px;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .vehicles-list {
            margin-top: 40px;
        }

        .vehicle-item {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f9f9f9;
        }

        .vehicle-item h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .vehicle-item p {
            margin-bottom: 5px;
        }

        .vehicle-image {
            max-width: 200px;
            max-height: 150px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .actions {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Vehicle Management - Admin Panel</h1>

        <div id="message" class="message"></div>

        <form id="vehicleForm">
            <div class="form-group">
                <label for="vehicleType">Vehicle Type:</label>
                <select id="vehicleType" required>
                    <option value="">Select Type</option>
                    <option value="car">Car</option>
                    <option value="truck">Truck</option>
                </select>
            </div>

            <div class="form-group">
                <label for="year">Year:</label>
                <input type="number" id="year" placeholder="e.g., 2024" min="1900" max="2030" required>
            </div>

            <div class="form-group">
                <label for="make">Make:</label>
                <input type="text" id="make" placeholder="e.g., Toyota" required>
            </div>

            <div class="form-group">
                <label for="model">Model:</label>
                <input type="text" id="model" placeholder="e.g., Camry" required>
            </div>

            <div class="form-group">
                <label for="price">Price ($):</label>
                <input type="number" id="price" placeholder="e.g., 25000" min="0" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" placeholder="Enter vehicle description" required></textarea>
            </div>

            <div class="form-group">
                <label for="image">Vehicle Image:</label>
                <input type="file" id="image" accept="image/*" required style="display: none;">
                <div class="file-input" id="fileDropZone" onclick="document.getElementById('image').click()">
                    <p>Drag & drop an image here, or click to select</p>
                </div>
                <div id="imagePreview" style="margin-top: 10px; display: none;">
                    <img id="previewImg" src="" alt="Preview" style="max-width: 100%; max-height: 200px; border-radius: 5px; border: 1px solid #ddd;">
                </div>
            </div>

            <button type="submit" class="btn">Add Vehicle</button>
            <button type="button" class="btn btn-secondary" onclick="loadVehicles()">Refresh List</button>
        </form>

        <div class="vehicles-list">
            <h2>Current Vehicles</h2>
            <div id="vehiclesContainer">
                <p>Loading vehicles...</p>
            </div>
        </div>
    </div>

    <!-- Supabase Scripts -->
    <script src="supabase-config.js"></script>
    <script src="supabase-utils.js"></script>
    <script src="admin.js"></script>
</body>
</html>
